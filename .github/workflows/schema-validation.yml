name: Schema Validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install schema-validation dependencies
        run: python -m pip install -r requirements-schema-validation.txt
      - name: Validate schemas and vectors
        run: python tools/validate_schemas.py
      - name: Run schema-validation unit tests
        run: python -m unittest discover -s tests -p "test_schema_validation.py"
